name: Integration Harness

on:
  workflow_dispatch: {}
  pull_request: {}

jobs:
  integration:
    name: Run integration harness (gated)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/auragate_integration.db
      IVR_ADAPTER: noop

    steps:
      - name: Check whether to run harness
        uses: actions/github-script@v6
        id: check
        with:
          script: |
            const eventName = github.context.eventName;
            if (eventName === 'workflow_dispatch') return { run: 'true' };
            if (eventName === 'pull_request') {
              const pr = github.context.payload.pull_request;
              if (!pr) return { run: 'false' };
              const labels = pr.labels.map(l => l.name);
              if (labels.includes('run-integration')) return { run: 'true' };
            }
            return { run: 'false' };

      - name: Checkout code
        uses: actions/checkout@v4
        if: steps.check.outputs.run == 'true'

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        if: steps.check.outputs.run == 'true'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        if: steps.check.outputs.run == 'true'

      - name: Install backend requirements
        if: steps.check.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Frontend: npm ci, build, lint, smoke
        if: steps.check.outputs.run == 'true'
        working-directory: frontend
        run: |
          npm ci
          CI=true npm run build
          npm run lint
          npm run smoke

      - name: Run backend tests
        if: steps.check.outputs.run == 'true'
        run: |
          pytest -q backend/tests/test_escalate.py

      - name: Start backend (uvicorn)
        if: steps.check.outputs.run == 'true'
        run: |
          set -o pipefail
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8001 &
          echo $! > /tmp/backend_pid

      - name: Wait for /health
        if: steps.check.outputs.run == 'true'
        run: |
          for i in $(seq 1 30); do
            if curl -sfS http://127.0.0.1:8001/health >/dev/null 2>&1; then
              echo "backend healthy"
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become healthy" >&2
          exit 1

      - name: Run integration harness
        if: steps.check.outputs.run == 'true'
        run: |
          set -o pipefail
          GOLDEN_THREAD_BASE=http://127.0.0.1:8001 python integration/run_golden_thread.py > integration/run_result.log 2>&1

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-run-artifacts
          path: |
            integration/run_result.log
            integration/last_run.json

      - name: Teardown backend
        if: always()
        run: |
          if [ -f /tmp/backend_pid ]; then
            kill "$(cat /tmp/backend_pid)" || true
          fi
