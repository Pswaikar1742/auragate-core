version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auragate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/neo4j"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: ./backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/auragate"
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URL: "bolt://neo4j:7687"
      # Example Twilio env vars (override in .env or CI)
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_PHONE_NUMBER: ""
      TO_PHONE_NUMBER: ""
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - neo4j
    volumes:
      - ./backend:/app/backend

  event-router:
    image: golang:1.22
    command: tail -f /dev/null
    volumes:
      - ./event-router:/app/event-router
    depends_on:
      - redis
    environment:
      REDIS_URL: "redis://redis:6379"

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm run dev --prefix /app/frontend"
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
